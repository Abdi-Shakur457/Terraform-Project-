#cloud-config
package_update: true

packages:
  - apache2
  - php
  - php-mysql
  - libapache2-mod-php
  - wget
  - unzip
  - mariadb-server
  - curl

runcmd:
  # 1. Start and enable Apache
  - systemctl start apache2
  - systemctl enable apache2

  # 2. Start and enable MariaDB
  - systemctl start mariadb
  - systemctl enable mariadb

  # 3. Create WordPress database and user
  - mysql -e "CREATE DATABASE wordpress;"
  - mysql -e "CREATE USER 'wpuser'@'localhost' IDENTIFIED BY 'password123';"
  - mysql -e "GRANT ALL PRIVILEGES ON wordpress.* TO 'wpuser'@'localhost';"
  - mysql -e "FLUSH PRIVILEGES;"

  # 4. Ensure web root exists and remove default page
  - mkdir -p /var/www/html
  - rm -f /var/www/html/index.html

  # 5. Download and extract WordPress
  - cd /var/www/html
  - wget https://wordpress.org/latest.tar.gz
  - tar -xzf latest.tar.gz
  - mv wordpress/* .
  - rm -rf wordpress latest.tar.gz

  # 6. Configure WordPress database connection
  - cp wp-config-sample.php wp-config.php
  - sed -i "s/database_name_here/wordpress/" wp-config.php
  - sed -i "s/username_here/wpuser/" wp-config.php
  - sed -i "s/password_here/password123/" wp-config.php
  - sed -i "s/localhost/127.0.0.1/" wp-config.php  # avoids socket issues

  # 7. Set correct permissions (Ubuntu uses www-data)
  - chown -R www-data:www-data /var/www/html
  - chmod -R 755 /var/www/html

  # 8. Restart Apache to apply changes
  - systemctl restart apache2