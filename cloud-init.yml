#cloud-config
packages:
  - httpd
  - php
  - php-mysqlnd
  - php-fpm
  - wget
  - unzip
  - mysql

runcmd:
  # Start and enable Apache
  - systemctl start httpd
  - systemctl enable httpd

  # Download and set up WordPress
  - cd /var/www/html
  - wget https://wordpress.org/latest.tar.gz
  - tar -xzf latest.tar.gz
  - mv wordpress/* .
  - rm -rf wordpress latest.tar.gz

  # Set proper permissions
  - chown -R apache:apache /var/www/html
  - chmod -R 755 /var/www/html

  # Optional: create wp-config.php if you have DB details
  # - cp wp-config-sample.php wp-config.php
  # - sed -i 's/database_name_here/YOUR_DB_NAME/' wp-config.php
  # - sed -i 's/username_here/YOUR_DB_USER/' wp-config.php
  # - sed -i 's/password_here/YOUR_DB_PASSWORD/' wp-config.php

  # Restart Apache to load PHP and serve WordPress
  - systemctl restart httpd